networks:
  docker-vnet:
    external: true

volumes:
  data:

services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    networks:
      - docker-vnet
    ports:
      - 3552:3552/tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - data:/app/data
      - ${HOME}/services:/app/data/projects
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:3552/api/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
